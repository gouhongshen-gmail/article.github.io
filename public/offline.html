<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LongLore is offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #f5f0e6;
        color: #1c1917;
        font: 16px/1.7 "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 34rem;
        padding: 2rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(28, 25, 23, 0.08);
        box-shadow: 0 24px 50px rgba(28, 25, 23, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        font-family: "Cormorant Garamond", Georgia, serif;
      }

      p {
        margin: 0 0 1rem;
        color: #57534e;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        background: #c4392a;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>LongLore saved part of the site for offline reading, but this page is not available right now.</p>
      <p>Reconnect to keep exploring Chinese history stories, vocabulary popovers, and your review queue.</p>
      <a href="/">Go back home</a>
    </main>
  </body>
</html>
